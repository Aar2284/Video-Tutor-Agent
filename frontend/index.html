<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tutor Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Settings</h2>
            </div>
            <div class="sidebar-content">
                <label class="toggle">
                    <input type="checkbox" id="voiceToggle">
                    <span class="toggle-slider"></span>
                    Voice Output (TTS)
                </label>
                <button class="btn btn-secondary" id="clearBtn" disabled>Clear Conversation</button>
            </div>
        </aside>

        <main class="main">
            <header class="main-header">
                <h1>Video Tutor Agent</h1>
                <p>Paste a YouTube link, get answers grounded in the video transcript.</p>
            </header>

            <section class="video-input">
                <h2>Video Input</h2>
                <div class="input-group">
                    <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
                    <button class="btn btn-primary" id="loadBtn">Load Video</button>
                </div>
                <div class="status" id="statusBar"></div>
                <div class="transcript-info" id="transcriptInfo"></div>
            </section>

            <section class="chat-section">
                <h2>Chat</h2>
                <div class="chat-container" id="chatContainer">
                    <div class="empty-state" id="emptyState">
                        Load a video and start asking questions.
                    </div>
                </div>
                <div class="chat-input-group">
                    <input type="text" id="questionInput" placeholder="Ask a question about the video..." disabled />
                    <button class="btn btn-icon" id="micBtn" disabled title="Voice Input (STT)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </button>
                    <button class="btn btn-primary" id="askBtn" disabled>Ask</button>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
